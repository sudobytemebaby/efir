version: '3.9'

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: efir-otel-collector
    env_file:
      - .env
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/otel/config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    networks:
      - efir-network

  prometheus:
    image: prom/prometheus:latest
    container_name: efir-prometheus
    env_file:
      - .env
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - efir-network

  loki:
    image: grafana/loki:latest
    container_name: efir-loki
    env_file:
      - .env
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - efir-network

  tempo:
    image: grafana/tempo:latest
    container_name: efir-tempo
    env_file:
      - .env
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "4311:4311"
      - "4312:4312"
      - "9411:9411"
    networks:
      - efir-network

  grafana:
    image: grafana/grafana:latest
    container_name: efir-grafana
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - efir-network

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

networks:
  efir-network:
    external: true
