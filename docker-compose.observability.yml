services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: efir-otel-collector
    profiles: ["observability"]
    env_file:
      - .env
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/otel/config.yml:/etc/otel-collector-config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - efir-network

  prometheus:
    image: prom/prometheus:3.10.0
    container_name: efir-prometheus
    profiles: ["observability"]
    env_file:
      - .env
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - efir-network

  loki:
    image: grafana/loki:3.6.7
    container_name: efir-loki
    profiles: ["observability"]
    env_file:
      - .env
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - efir-network

  tempo:
    image: grafana/tempo:2.10.1
    container_name: efir-tempo
    profiles: ["observability"]
    env_file:
      - .env
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - efir-network

  grafana:
    image: grafana/grafana:12.4.1
    container_name: efir-grafana
    profiles: ["observability"]
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - efir-network

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

networks:
  efir-network:
    external: true
