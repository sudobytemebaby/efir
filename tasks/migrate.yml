# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

set: [pipefail]

tasks:
  up:
    desc: "Apply migrations  (all services, or: task migrate:up SERVICE=auth)"
    cmds:
      - bash ./tasks/scripts/migrate-up.sh "{{.SERVICE}}"

  down:
    desc: "Rollback last migration  (usage: task migrate:down SERVICE=auth)"
    requires:
      vars: [SERVICE]
    cmds:
      - bash ./tasks/scripts/migrate-down.sh "{{.SERVICE}}"

  create:
    desc: "Create a new migration  (usage: task migrate:create SERVICE=auth NAME=create_users)"
    requires:
      vars: [SERVICE, NAME]
    cmds:
      - bash ./tasks/scripts/migrate-create.sh "{{.SERVICE}}" "{{.NAME}}"

  status:
    desc: "Show migration status  (all services, or: task migrate:status SERVICE=auth)"
    cmds:
      - bash ./tasks/scripts/migrate-status.sh "{{.SERVICE}}"
