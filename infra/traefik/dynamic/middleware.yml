http:
  middlewares:
    rate-limit:
      rateLimit:
        average: 100
        period: 1m
        burst: 50

    cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowOriginList:
          - "*"
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
        accessControlExposeHeaders:
          - "*"
        accessControlMaxAge: 86400

    # Generate: htpasswd -nb admin yourpassword
    dashboard-auth:
      basicAuth:
        users:
          - "admin:$apr1$xyz$hashedpassword"

  routers:
    dashboard:
      rule: "Host(`traefik.localhost`)"
      service: api@internal
      middlewares:
        - dashboard-auth
