api:
  dashboard: true

ping: {}

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls: {}

providers:
  docker:
    network: efir-network
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true
