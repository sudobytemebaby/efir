# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

set: [pipefail]
dotenv: [".env"]

includes:
  docker: ./tasks/docker.yml
  go: ./tasks/go.yml
  proto: ./tasks/proto.yml
  migrate: ./tasks/migrate.yml

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list

  setup:
    desc: Initialize project after clone (network, env, hooks, tools)
    cmds:
      - docker network create efir-network || true
      - cp -n .env.example .env || true
      - cp -n deploy/compose/docker-compose.dev.example.yml deploy/compose/docker-compose.dev.yml || true
      - git config core.hooksPath .githooks
      - task: tools

  tools:
    desc: Install required dev tools (pinned versions)
    cmds:
      # buf must be installed separately — https://buf.build/docs/installation
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - go install github.com/vektra/mockery/v2@v2.53.6
      - go install github.com/pressly/goose/v3/cmd/goose@latest
