version: "3"

tasks:
  setup:
    desc: Initialize project after clone
    cmds:
      - docker network create efir-network || true
      - cp .env.example .env || true
      - cp docker-compose.dev.example.yml docker-compose.dev.yml || true
      - git config core.hooksPath .githooks

  up:
    desc: Start all services
    cmds:
      - docker compose up -d

  down:
    desc: Stop all services
    cmds:
      - docker compose down

  restart:
    desc: Restart a specific service
    cmds:
      - docker compose restart {{.CLI_ARGS}}

  logs:
    desc: Show logs for a specific service
    cmds:
      - docker compose logs -f {{.CLI_ARGS}}

  ps:
    desc: Show status of all containers
    cmds:
      - docker compose ps

  infra:up:
    desc: Start infrastructure only
    cmds:
      - docker compose -f docker-compose.infra.yml up -d

  infra:down:
    desc: Stop infrastructure
    cmds:
      - docker compose -f docker-compose.infra.yml down

  obs:up:
    desc: Start infrastructure + observability
    cmds:
      - docker compose -f docker-compose.infra.yml -f docker-compose.observability.yml up -d

  obs:down:
    desc: Stop observability
    cmds:
      - docker compose -f docker-compose.observability.yml down

  sidecar:up:
    desc: Start sidecar containers
    cmds:
      - docker compose -f docker-compose.sidecar.yml up -d

  sidecar:down:
    desc: Stop sidecar containers
    cmds:
      - docker compose -f docker-compose.sidecar.yml down

  proto:lint:
    desc: Lint proto files
    cmds:
      - buf lint proto/

  proto:
    desc: Generate Go code from proto files
    cmds:
      - buf generate

  generate:
    desc: Generate mocks for all services
    cmds:
      - go generate ./...

  run:
    desc: Run a service locally
    cmds:
      - cd services/{{.CLI_ARGS}} && go run cmd/main.go

  test:
    desc: Run tests for all services
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  migrate:up:
    desc: Apply all pending migrations for a service
    cmds:
      - |
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "Usage: task migrate:up SERVICE=auth"
          exit 1
        fi
        goose -dir=services/{{.CLI_ARGS}}/migrations up

  migrate:down:
    desc: Rollback last migration for a service
    cmds:
      - |
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "Usage: task migrate:down SERVICE=auth"
          exit 1
        fi
        goose -dir=services/{{.CLI_ARGS}}/migrations down

  migrate:create:
    desc: Create a new migration
    cmds:
      - |
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "Usage: task migrate:create SERVICE=auth NAME=create_users"
          exit 1
        fi
        goose -dir=services/{{.CLI_ARGS}}/migrations create {{.CLI_ARGS}} sql

  migrate:status:
    desc: Show migration status for all services
    cmds:
      - |
        for svc in auth user room message; do
          echo "=== $svc ==="
          goose -dir=services/$svc/migrations status || true
        done
