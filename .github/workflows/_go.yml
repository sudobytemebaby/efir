name: Go

on:
  workflow_call:
    inputs:
      has-proto:
        description: Whether proto files were generated
        type: string
        required: false
        default: "false"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Go files
        id: check
        run: bash .github/scripts/check-go-files.sh

      - name: Setup Go + Proto
        if: steps.check.outputs.has_go == 'true'
        uses: ./.github/actions/setup-go-proto
        with:
          generate: "false"

      - name: Download generated proto files
        if: steps.check.outputs.has_go == 'true' && inputs.has-proto == 'true'
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: services/shared/gen

      - name: Install golangci-lint v2
        if: steps.check.outputs.has_go == 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0

      - name: Run golangci-lint across all workspace modules
        if: steps.check.outputs.has_go == 'true'
        run: bash .github/scripts/lint-go-modules.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Go files
        id: check
        run: bash .github/scripts/check-go-files.sh

      - name: Setup Go + Proto
        if: steps.check.outputs.has_go == 'true'
        uses: ./.github/actions/setup-go-proto
        with:
          generate: "false"

      - name: Download generated proto files
        if: steps.check.outputs.has_go == 'true' && inputs.has-proto == 'true'
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: services/shared/gen

      - name: Run tests with coverage
        if: steps.check.outputs.has_go == 'true'
        run: bash .github/scripts/test-go-modules.sh

      - name: Upload coverage artifact
        if: steps.check.outputs.has_go == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 3

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: test
    if: false # TODO: enable in Module 1 with thresholds
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Check coverage threshold
        run: bash .github/scripts/check-coverage.sh
