name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-messages:
    name: Commit Message Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Validate commit subjects
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          pattern='^(feat|fix|infra|refactor|test|docs|ci|style|chore)(\([a-z0-9-]+\))?: \S.{0,99}$'
          zero_sha='0000000000000000000000000000000000000000'

          if [ "$EVENT_NAME" = "pull_request" ]; then
            range="$PR_BASE_SHA..$PR_HEAD_SHA"
          elif [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "$zero_sha" ]; then
            range="$PUSH_BEFORE_SHA..$CURRENT_SHA"
          else
            range="$CURRENT_SHA^..$CURRENT_SHA"
          fi

          status=0
          while IFS= read -r subject; do
            [ -n "$subject" ] || continue
            if ! printf '%s\n' "$subject" | grep -qE "$pattern"; then
              echo "Invalid commit message: $subject"
              status=1
            fi
          done < <(git log --no-merges --format=%s "$range")

          exit "$status"

  module-0-foundation:
    name: Module 0 Foundation Check
    runs-on: ubuntu-latest
    needs: commit-messages
    steps:
      - uses: actions/checkout@v4

      - name: Verify required foundation files
        run: |
          required=(
            .env.example
            .gitignore
            .golangci.yml
            README.md
            Taskfile.yml
            buf.gen.yaml
            buf.yaml
            deploy/docker-compose.yml
            deploy/compose/docker-compose.dev.example.yml
            deploy/compose/docker-compose.infra.yml
            deploy/compose/docker-compose.network.yml
            deploy/compose/docker-compose.observability.yml
            deploy/compose/docker-compose.services.yml
            deploy/compose/docker-compose.sidecar.yml
            docs/git-workflow.md
            docs/adr/001-monorepo.md
            docs/adr/002-sidecar-pep.md
            docs/adr/003-modular-compose.md
            docs/adr/004-go-workspace.md
            docs/adr/005-git-hooks-without-husky.md
            docs/adr/006-ci-pipeline.md
            infra/postgres/init/01_create_databases.sql
            infra/postgres/init/02_create_users.sh
            infra/nats/nats.conf
            infra/valkey/valkey.conf
            infra/traefik/traefik.yml
            infra/traefik/dynamic/middleware.yml
          )

          for path in "${required[@]}"; do
            test -e "$path" || {
              echo "Missing required file: $path"
              exit 1
            }
          done

      - name: Verify required directories
        run: |
          required=(
            proto/efir/auth
            proto/efir/user
            proto/efir/room
            proto/efir/message
            services/auth
            services/user
            services/room
            services/message
            services/websocket
            services/gateway
            services/sidecar
            services/shared
          )

          for path in "${required[@]}"; do
            test -d "$path" || {
              echo "Missing required directory: $path"
              exit 1
            }
          done

  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    needs: module-0-foundation
    steps:
      - uses: actions/checkout@v4

      - name: Check for proto files
        id: check-proto
        run: |
          if find proto/ -name "*.proto" 2>/dev/null | grep -q .; then
            echo "has_proto=true" >> $GITHUB_OUTPUT
          else
            echo "has_proto=false" >> $GITHUB_OUTPUT
            echo "No proto files found, skipping"
          fi

      - name: Setup buf
        if: steps.check-proto.outputs.has_proto == 'true'
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.66.0"
          github_token: ${{ github.token }}

      - name: Lint proto files
        if: steps.check-proto.outputs.has_proto == 'true'
        run: buf lint

  proto-generate:
    name: Proto Generate
    runs-on: ubuntu-latest
    needs: proto-lint
    steps:
      - uses: actions/checkout@v4

      - name: Check for proto files
        id: check-proto
        run: |
          if find proto/ -name "*.proto" 2>/dev/null | grep -q .; then
            echo "has_proto=true" >> $GITHUB_OUTPUT
          else
            echo "has_proto=false" >> $GITHUB_OUTPUT
            echo "No proto files found, skipping"
          fi

      - name: Setup Go + Proto
        if: steps.check-proto.outputs.has_proto == 'true'
        uses: ./.github/actions/setup-go-proto

      - name: Upload generated proto files
        if: steps.check-proto.outputs.has_proto == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: proto-generated
          path: services/shared/gen/
          retention-days: 3

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: proto-generate
    steps:
      - uses: actions/checkout@v4

      - name: Check for Go files
        id: check-go
        run: |
          if find services/ -name "*.go" 2>/dev/null | grep -q .; then
            echo "has_go=true" >> $GITHUB_OUTPUT
          else
            echo "has_go=false" >> $GITHUB_OUTPUT
            echo "No Go files found, skipping"
          fi

      - name: Setup Go + Proto
        if: steps.check-go.outputs.has_go == 'true'
        uses: ./.github/actions/setup-go-proto
        with:
          generate: "false"

      - name: Download generated proto files
        if: steps.check-go.outputs.has_go == 'true'
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: services/shared/gen

      - name: Install golangci-lint v2
        if: steps.check-go.outputs.has_go == 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0

      - name: Run golangci-lint across all workspace modules
        if: steps.check-go.outputs.has_go == 'true'
        run: |
          for dir in $(go list -m -f '{{.Dir}}'); do
            echo "→ Linting $dir"
            (
              cd "$dir"
              golangci-lint run --config "$GITHUB_WORKSPACE/.golangci.yml" ./...
            ) || exit 1
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: proto-generate
    steps:
      - uses: actions/checkout@v4

      - name: Check for Go files
        id: check-go
        run: |
          if find services/ -name "*.go" 2>/dev/null | grep -q .; then
            echo "has_go=true" >> $GITHUB_OUTPUT
          else
            echo "has_go=false" >> $GITHUB_OUTPUT
            echo "No Go files found, skipping"
          fi

      - name: Setup Go + Proto
        if: steps.check-go.outputs.has_go == 'true'
        uses: ./.github/actions/setup-go-proto
        with:
          generate: "false"

      - name: Download generated proto files
        if: steps.check-go.outputs.has_go == 'true'
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: services/shared/gen

      - name: Run tests with coverage
        if: steps.check-go.outputs.has_go == 'true'
        run: |
          rm -f coverage.out
          touch coverage.out
          first=1
          for dir in $(go list -m -f '{{.Dir}}'); do
            tmp=$(mktemp)
            (
              cd "$dir"
              go test -coverprofile="$tmp" -covermode=atomic ./...
            ) || {
              rm -f "$tmp"
              exit 1
            }
            if [ -s "$tmp" ]; then
              if [ "$first" -eq 1 ]; then
                cat "$tmp" > coverage.out
                first=0
              else
                tail -n +2 "$tmp" >> coverage.out
              fi
            fi
            rm -f "$tmp"
          done

      - name: Upload coverage artifact
        if: steps.check-go.outputs.has_go == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 3

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: test
    if: false
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Check coverage threshold
        run: |
          go tool cover -func=coverage.out | grep -E "service|handler" | awk '
          {
            pct = substr($3, 1, length($3)-1)
            if ($2 ~ /service/ && pct+0 < 70) {
              print "FAIL: " $0 " (below 70%)"
              exit 1
            }
            if ($2 ~ /handler/ && pct+0 < 60) {
              print "FAIL: " $0 " (below 60%)"
              exit 1
            }
          }'

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfiles
        id: check-docker
        run: |
          if find services/ -name "Dockerfile" 2>/dev/null | grep -q .; then
            echo "has_dockerfiles=true" >> $GITHUB_OUTPUT
          else
            echo "has_dockerfiles=false" >> $GITHUB_OUTPUT
            echo "No Dockerfiles found, skipping"
          fi

      - name: Setup Go + Proto
        if: steps.check-docker.outputs.has_dockerfiles == 'true'
        uses: ./.github/actions/setup-go-proto

      - name: Build all service images
        if: steps.check-docker.outputs.has_dockerfiles == 'true'
        run: |
          services=(gateway auth user message room websocket)
          for svc in "${services[@]}"; do
            if [ -f "services/$svc/Dockerfile" ]; then
              echo "Building $svc..."
              docker build -t efir-$svc:ci -f services/$svc/Dockerfile .
            fi
          done
