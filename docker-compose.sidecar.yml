services:
  auth-sidecar:
    build:
      context: .
      dockerfile: ./services/sidecar/Dockerfile
    container_name: efir-auth-sidecar
    profiles: ["sidecar"]
    env_file:
      - .env
    environment:
      - UPSTREAM_SERVICE=auth
      - UPSTREAM_ADDR=auth:50051
    volumes:
      - ./services/sidecar/config:/config:ro
    depends_on:
      auth:
        condition: service_started
    networks:
      - efir-network

  user-sidecar:
    build:
      context: .
      dockerfile: ./services/sidecar/Dockerfile
    container_name: efir-user-sidecar
    profiles: ["sidecar"]
    env_file:
      - .env
    environment:
      - UPSTREAM_SERVICE=user
      - UPSTREAM_ADDR=user:50052
    volumes:
      - ./services/sidecar/config:/config:ro
    depends_on:
      user:
        condition: service_started
    networks:
      - efir-network

  room-sidecar:
    build:
      context: .
      dockerfile: ./services/sidecar/Dockerfile
    container_name: efir-room-sidecar
    profiles: ["sidecar"]
    env_file:
      - .env
    environment:
      - UPSTREAM_SERVICE=room
      - UPSTREAM_ADDR=room:50053
    volumes:
      - ./services/sidecar/config:/config:ro
    depends_on:
      room:
        condition: service_started
    networks:
      - efir-network

  message-sidecar:
    build:
      context: .
      dockerfile: ./services/sidecar/Dockerfile
    container_name: efir-message-sidecar
    profiles: ["sidecar"]
    env_file:
      - .env
    environment:
      - UPSTREAM_SERVICE=message
      - UPSTREAM_ADDR=message:50054
    volumes:
      - ./services/sidecar/config:/config:ro
    depends_on:
      message:
        condition: service_started
    networks:
      - efir-network

networks:
  efir-network:
    external: true
